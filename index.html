<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Blue-Themed Card-Based Form</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f8ff;
            margin: 0;
            padding: 0;
        }
        .container {
            max-width: 600px;
            margin: 20px auto;
            padding: 20px;
            background-color: white;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        h1 {
            text-align: center;
            color: #007bff;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input, textarea, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ced4da;
            border-radius: 4px;
            box-sizing: border-box;
        }
        .btn {
            display: block;
            width: 100%;
            padding: 15px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }
        .preview {
            padding: 10px;
            border: 1px dashed #007bff;
            background-color: #e9f7ff;
            margin-top: 20px;
        }
        @media (max-width: 600px) {
            .btn {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Driver Info Form</h1>
        <div class="form-group">
            <label for="group-reference">Group Reference</label>
            <input type="text" id="group-reference" placeholder="Enter Group Reference">
        </div>
        <div class="form-group">
            <label for="tour-leader-contact">Tour Leader Contact</label>
            <input type="text" id="tour-leader-contact" placeholder="Enter Tour Leader Contact">
        </div>
        <div class="form-group">
            <label for="tour-leader-name">Tour Leader Name</label>
            <input type="text" id="tour-leader-name" placeholder="Enter Tour Leader Name">
        </div>
        <div class="form-group">
            <label for="driver-info">Driver Info</label>
            <input type="text" id="driver-info" placeholder="Enter Driver Info">
        </div>
        <div class="form-group">
            <label for="pick-up-time">Pick Up Time</label>
            <input type="text" id="pick-up-time" placeholder="Enter Pick Up Time">
        </div>
        <div class="form-group">
            <label for="pick-up-location">Pick Up Location</label>
            <input type="text" id="pick-up-location" placeholder="Enter Pick Up Location">
        </div>
        <div class="form-group">
            <label for="driver-telephone">Driver Telephone</label>
            <input type="text" id="driver-telephone" placeholder="Enter Driver Telephone">
        </div>
        <div class="form-group">
            <label for="driver-name">Driver Name</label>
            <input type="text" id="driver-name" placeholder="Enter Driver Name">
        </div>
        <div class="form-group">
            <label for="coach-details">Coach Details</label>
            <textarea id="coach-details" placeholder="Enter Coach Details"></textarea>
        </div>
        <div class="preview">
            <h3>Message Preview</h3>
            <p>Your input will appear here...</p>
        </div>
        <button class="btn">Share on Social Media</button>
    </div>
</body>
</html>
